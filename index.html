<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>שאלון</title>
</head>
<body>

<h2>שאלון</h2>

<form id="quiz"></form>

<button onclick="calculateResult()">חשב תוצאה</button>

<h3 id="result"></h3>

<script>
const questions = [
  { text: "בישיבות צוות אני נוטה להוביל את הדיון קדימה.", type: "initiative" },
  { text: "חשוב לי שכולם ירגישו שנשמע קולם לפני שמתקבלת החלטה.", type: "coordination" },
  { text: "אם משהו מתעכב – אני פשוט מתחילה לפעול גם בלי סגירה מלאה.", type: "initiative" },
  { text: "אני מעדיפה להמתין ולהבין לעומק לפני שאני מציעה כיוון.", type: "initiative_reverse" },
  { text: "אני לוקחת אחריות גם על התיאום בין אנשים.", type: "coordination" },
  { text: "כשיש מתח בצוות, אני מנסה להרגיע ולחבר בין הצדדים.", type: "coordination" },
  { text: "קשה לי לעבוד בקצב איטי או בתהליך ארוך מדי.", type: "initiative" },
  { text: "אני מרגישה בנוח לעבוד לבד מבלי לעדכן כל הזמן.", type: "coordination_reverse" },
  { text: "חשוב לי שמהלך חדש יהיה מוסכם ולא ייכפה.", type: "coordination" },
  { text: "אני מזהה במהירות מה צריך לקרות ופועלת מיד.", type: "initiative" },
  { text: "אם איני בטוחה בתמונה המלאה – אעדיף לא ליזום.", type: "initiative_reverse" },
  { text: "אני נוטה לראות את התמונה הרחבה ולכוון אחרים בהתאם.", type: "initiative" },
  { text: "אני מעדיפה יציבות על פני שינוי מהיר.", type: "initiative_reverse" },
  { text: "כשיש מחלוקת, אני מנסה למצוא את נקודת האמצע.", type: "coordination" },
  { text: "לעיתים אני מקדמת דברים גם אם לא כולם מרוצים.", type: "initiative" },
  { text: "אני נזהרת לא למשוך תשומת לב מיותרת בדיונים.", type: "initiative_reverse" },
  { text: "אני חשה אחריות לכך שהצוות ינוע קדימה.", type: "initiative" },
  { text: "אני משקיעה זמן ביצירת הרמוניה בצוות.", type: "coordination" },
  { text: "אני מעדיפה לפעול באופן עצמאי ופחות תלוי באחרים.", type: "coordination_reverse" },
  { text: "חשוב לי שהמהלך יהיה מדויק גם אם זה לוקח יותר זמן.", type: "initiative_reverse" }
];

const quiz = document.getElementById("quiz");

// יצירת השאלות על המסך
questions.forEach((q, index) => {
  const div = document.createElement("div");

  div.innerHTML = `
    <p>${index + 1}. ${q.text}</p>
    ${[1,2,3,4,5].map(v => `
      <label>
        <input type="radio" name="q${index}" value="${v}"> ${v}
      </label>
    `).join("")}
  `;

  quiz.appendChild(div);
});

let initiativeScore = 0;
let coordinationScore = 0;

function calculateResult() {
  initiativeScore = 0;
  coordinationScore = 0;

  questions.forEach((q, index) => {
    const value = parseInt(document.querySelector(`input[name="q${index}"]:checked`)?.value || 0);

    if (q.type === "initiative") initiativeScore += value;
    if (q.type === "coordination") coordinationScore += value;
    if (q.type === "initiative_reverse") initiativeScore += (6 - value);
    if (q.type === "coordination_reverse") coordinationScore += (6 - value);
  });

  const initiativeHigh = initiativeScore >= 60;
  const coordinationHigh = coordinationScore >= 60;

  let result = "";

  if (initiativeHigh && coordinationHigh) result = "🦁 לביאה – מנהיגה מערכתית";
  else if (!initiativeHigh && coordinationHigh) result = "🐝 דבורה – מחברת ומלכדת";
  else if (initiativeHigh && !coordinationHigh) result = "🐆 צ'יטה – יוזמת ודוחפת קדימה";
  else result = "🐢 צב – מייצבת ושקולה";

  document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
